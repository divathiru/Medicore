server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # The compiled React bundle uses relative paths (no hardcoded host).
    # In AWS ECS, requests arrive here from the ALB already — the ALB listener
    # rules route /auth/*, /patients/*, etc. directly to main-website:4000.
    # So this proxy block is the fallback for direct-to-frontend requests and
    # for local docker-compose (where main-website is the compose service name).
    #
    # Resolver is set to 169.254.169.253 (AWS VPC DNS) so nginx can resolve
    # Cloud Map DNS names like main-website.medicore-dev.local at runtime.
    # In docker-compose, the Docker internal resolver (127.0.0.11) handles it.

    resolver 169.254.169.253 127.0.0.11 valid=10s ipv6=off;

    set $main_website_url "http://main-website.medicore-dev.local:4000";

    location /auth/ {
        proxy_pass         $main_website_url/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /patients/ {
        proxy_pass         $main_website_url/patients/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_request_buffering off;
        client_max_body_size 25m;
    }

    location /doctors {
        proxy_pass         $main_website_url/doctors;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /cashier/ {
        proxy_pass         $main_website_url/cashier/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /ai/ {
        proxy_pass         $main_website_url/ai/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 90s;
    }

    location /health {
        proxy_pass         $main_website_url/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback — must come LAST ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

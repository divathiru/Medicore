# =============================================================
# MediCore — docker-compose.yml  (Day 5 — full stack)
# =============================================================
volumes:
  postgres_data:
  uploads_data:
networks:
  medicore_net:
    driver: bridge
services:
  # ===========================================================
  # PostgreSQL with pgvector extension
  # ===========================================================
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: medicore
      POSTGRES_PASSWORD: medicore_dev
      POSTGRES_DB: medicore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicore -d medicore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================
  # ai-service — must be healthy before patient/doctor start
  # (they call /ingest/* on patient summary upload)
  # ===========================================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===========================================================
  # main-website — auth + API gateway  (port 4000)
  # ===========================================================
  main-website:
    build:
      context: ./main-website
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================
  # patient-service — patient profiles, appointment booking
  # ===========================================================
  patient-service:
    build:
      context: ./patient-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4001"
    ports:
      - "4001:4001"
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================
  # doctor-service — appointment queue, prescriptions
  # ===========================================================
  doctor-service:
    build:
      context: ./doctor-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4002"
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================
  # cashier-service — payments, queue position assignment
  # ===========================================================
  cashier-service:
    build:
      context: ./cashier-service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4003"
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ===========================================================
  # Frontend — React/Vite built by nginx  (port 5173 → 80)
  # ===========================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      main-website:
        condition: service_healthy
    networks:
      - medicore_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
name: "CI · ai-service"

on:
  push:
    branches: ["**"]
    paths:
      - "ai-service/**"
      - ".github/workflows/ci-ai-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ai-service/**"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/medicore-ai-service

jobs:
  lint-and-test:
    name: Lint & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check app/ || true  # advisory only; failures do not block

      - name: Smoke test — /health
        env:
          DATABASE_URL: "postgres://fake:fake@localhost:5432/fake"
          MISTRAL_API_KEY: "ci-test-key-not-real"
        run: |
          # Start server; /health returns immediately without DB or API calls
          uvicorn app.main:app --host 0.0.0.0 --port 5000 &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            curl -sf http://localhost:5000/health && break
            sleep 1
          done
          curl -sf http://localhost:5000/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"
          kill $SERVER_PID

  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: ./ai-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

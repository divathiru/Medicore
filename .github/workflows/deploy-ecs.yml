# .github/workflows/deploy-ecs.yml
# ─────────────────────────────────────────────────────────────────────────────
# MediCore — ECS Fargate Deploy via GitHub OIDC
#
# Triggered automatically on merge to main (after CI workflows pass).
# Uses OIDC federation — no long-lived AWS keys stored in GitHub Secrets.
#
# Required GitHub repo secrets/variables:
#   AWS_REGION        (var)  — e.g. us-east-1
#   AWS_DEPLOY_ROLE   (var)  — ARN output from terraform output github_deploy_role_arn
#   ECS_CLUSTER       (var)  — from terraform output ecs_cluster_name
#   GHCR_REGISTRY     (var)  — e.g. ghcr.io/your-username
#
# Each service job:
#   1. Assumes the OIDC deploy role
#   2. Registers a new Task Definition revision with the updated image tag
#   3. Updates the ECS service to the new revision
# ─────────────────────────────────────────────────────────────────────────────
name: "Deploy · ECS Fargate"

on:
  workflow_run:
    workflows:
      - "CI · main-website"
      - "CI · patient-service"
      - "CI · doctor-service"
      - "CI · cashier-service"
      - "CI · ai-service"
      - "CI · frontend"
    branches: [main]
    types: [completed]
  workflow_dispatch:  # allow manual trigger

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  GHCR_REGISTRY: ${{ vars.GHCR_REGISTRY }}

jobs:
  # Shared setup — only deploy if triggering CI succeeded (or manual)
  deploy-main-website:
    name: Deploy main-website
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        id: get-taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-main-website \
            --query taskDefinition \
            --output json > task-def.json
          echo "task_def_file=task-def.json" >> "$GITHUB_OUTPUT"

      - name: Update image in task definition
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: main-website
          image: ${{ env.GHCR_REGISTRY }}/medicore-main-website:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-main-website
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-patient-service:
    name: Deploy patient-service
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: deploy-main-website

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-patient-service \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: patient-service
          image: ${{ env.GHCR_REGISTRY }}/medicore-patient-service:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-patient-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-doctor-service:
    name: Deploy doctor-service
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: deploy-main-website

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-doctor-service \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: doctor-service
          image: ${{ env.GHCR_REGISTRY }}/medicore-doctor-service:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-doctor-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-cashier-service:
    name: Deploy cashier-service
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: deploy-main-website

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-cashier-service \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: cashier-service
          image: ${{ env.GHCR_REGISTRY }}/medicore-cashier-service:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-cashier-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-ai-service:
    name: Deploy ai-service
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: []  # ai-service can deploy in parallel with gateway

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-ai-service \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ai-service
          image: ${{ env.GHCR_REGISTRY }}/medicore-ai-service:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-ai-service
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: [deploy-main-website]  # frontend needs gateway healthy first

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition medicore-dev-frontend \
            --query taskDefinition \
            --output json > task-def.json

      - name: Update image
        id: update-image
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: frontend
          image: ${{ env.GHCR_REGISTRY }}/medicore-frontend:sha-${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.update-image.outputs.task-definition }}
          service: medicore-dev-frontend
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ---------------------------------------------------------------------------
  # Seed-doc ingestion — runs automatically after every successful ai-service
  # deploy. Uses ecs run-task with a command override so the same ai-service
  # image runs ingest_seed_docs.py as a one-off Fargate task inside the VPC.
  #
  # Why approach (a) / ecs run-task:
  #   - Reuses the existing ai-service task definition (same IAM role, same
  #     DATABASE_URL + MISTRAL_API_KEY secrets, same VPC/subnet/SG).
  #   - No new infrastructure — no bastion, no RDS SG changes, no new roles.
  #   - The script is already idempotent: it skips files whose source_file
  #     already exists in public.embeddings, so re-running on an unchanged
  #     deploy is a no-op (0 inserted / N skipped / 0 failed).
  #   - Any new .md/.txt/.pdf dropped into seed-docs/ and committed to main
  #     will be embedded automatically on the next push — zero manual steps.
  # ---------------------------------------------------------------------------
  ingest-seed-docs:
    name: Ingest seed docs into public RAG corpus
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    needs: [deploy-ai-service]  # wait for the fresh ai-service image to be stable first

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Resolve network config from the live ai-service ECS service ──────────
      - name: Resolve VPC subnet and security group from live ai-service
        id: network
        run: |
          # Read the network config from the currently running ai-service task
          TASK_ARN=$(aws ecs list-tasks \
            --cluster "$ECS_CLUSTER" \
            --service-name medicore-dev-ai-service \
            --query 'taskArns[0]' --output text)

          SUBNET=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`subnetId`].value' \
            --output text)

          SG=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          # Fall back to querying the service's network config directly
          SERVICE_CONFIG=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services medicore-dev-ai-service \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' \
            --output json)

          SUBNET=$(echo "$SERVICE_CONFIG" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['subnets'][0])")
          SG=$(echo "$SERVICE_CONFIG" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['securityGroups'][0])")

          echo "subnet=$SUBNET" >> "$GITHUB_OUTPUT"
          echo "sg=$SG"         >> "$GITHUB_OUTPUT"
          echo "Resolved: subnet=$SUBNET  sg=$SG"

      # ── Get the latest ai-service task definition ARN ─────────────────────────
      - name: Get ai-service task definition ARN
        id: taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition medicore-dev-ai-service \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
          echo "Task def: $TASK_DEF_ARN"

      # ── Launch the one-off ingestion task ─────────────────────────────────────
      - name: Run ingest_seed_docs.py as one-off ECS Fargate task
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "${{ steps.taskdef.outputs.arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ steps.network.outputs.subnet }}],
              securityGroups=[${{ steps.network.outputs.sg }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "ai-service",
                "command": ["python", "scripts/ingest_seed_docs.py"]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)

          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Ingestion task launched: $TASK_ARN"

      # ── Wait for the task to finish and check exit code ───────────────────────
      - name: Wait for ingestion task to complete
        run: |
          TASK_ARN="${{ steps.run-task.outputs.task_arn }}"
          echo "Waiting for task to stop: $TASK_ARN"

          # Poll every 15 seconds, timeout after 10 minutes (40 attempts)
          for i in $(seq 1 40); do
            STATUS=$(aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' --output text)
            echo "  Attempt $i: status=$STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 15
          done

          if [ "$STATUS" != "STOPPED" ]; then
            echo "ERROR: Task did not stop within 10 minutes."
            exit 1
          fi

          # Check container exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)

          echo "Ingestion task exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "ERROR: Ingestion task failed with exit code $EXIT_CODE"
            echo "Check CloudWatch logs at: /ecs/medicore-dev/ai-service"
            exit 1
          fi

          echo "✅ Seed-doc ingestion completed successfully."

      # ── Print the ingestion log tail from CloudWatch ──────────────────────────
      - name: Print ingestion output from CloudWatch
        if: always()
        run: |
          TASK_ID=$(echo "${{ steps.run-task.outputs.task_arn }}" | awk -F/ '{print $NF}')
          LOG_STREAM="ecs/ai-service/${TASK_ID}"
          echo "Fetching logs from: /ecs/medicore-dev/ai-service  stream: $LOG_STREAM"
          aws logs get-log-events \
            --log-group-name "/ecs/medicore-dev/ai-service" \
            --log-stream-name "$LOG_STREAM" \
            --limit 50 \
            --query 'events[*].message' --output text 2>/dev/null \
            || echo "(log stream not yet available — check CloudWatch manually)"
